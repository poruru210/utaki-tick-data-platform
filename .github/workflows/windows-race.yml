name: Windows race detector

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  race:
    name: Go race detector (Windows)
    runs-on: windows-2025
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          version: 2026.7.0

      - name: Install mise-managed tools
        shell: pwsh
        run: |
          mise trust
          mise install

      - name: Verify CGO toolchain
        shell: pwsh
        run: |
          gcc --version
          mise exec -- go version
          $env:CGO_ENABLED = "1"
          mise exec -- go env GOOS GOARCH CGO_ENABLED CC

      - name: Run race detector
        shell: pwsh
        env:
          CGO_ENABLED: "1"
        run: mise exec -- go test -race ./internal/ingest ./internal/wal ./internal/archive ./internal/r2 ./internal/delivery ./internal/catalog ./internal/continuity ./internal/parquet
