name: Repository check

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Repository check
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          version: 2026.7.0

      - name: Run repository checks
        run: mise run check

      - name: Run Go vet
        run: mise exec -- go vet ./...
